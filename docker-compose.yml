# Matrix Stack — Podman Compose
# Starten:  podman-compose up         (in Machine, ~/projects/matrix/)
# Mit Mock: podman-compose --profile dev up

services:
  # ── Homeserver (Tuwunel) ─────────────────────────────────────────────────
  tuwunel:
    image: ghcr.io/matrix-construct/tuwunel:latest
    container_name: tuwunel
    volumes:
      - ./homeserver/tuwunel.image.toml:/etc/tuwunel/tuwunel.toml:ro
      - tuwunel-data:/var/lib/tuwunel
    ports:
      - "8448:8448"
    command: ["--config", "/etc/tuwunel/tuwunel.toml"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8448/_matrix/client/versions"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── NATS (Message Queue) ─────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    container_name: nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--js", "-m", "8222"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Go Appservice ────────────────────────────────────────────────────────
  go-appservice:
    build: ./go-appservice
    container_name: go-appservice
    env_file: ./go-appservice/.env.development
    ports:
      - "8090:8090"
    depends_on:
      tuwunel:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Python Agent Bridge ──────────────────────────────────────────────────
  python-bridge:
    build: ./python-agent-bridge
    container_name: python-bridge
    env_file: ./python-agent-bridge/.env
    ports:
      - "8097:8097"
    depends_on:
      nats:
        condition: service_healthy
      go-appservice:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Chat UI ──────────────────────────────────────────────────────
  nextjs-chat:
    build:
      context: ./nextjs-chat
      args:
        - NEXT_PUBLIC_MATRIX_HOMESERVER_URL=http://localhost:8448
    container_name: nextjs-chat
    ports:
      - "3000:3000"
    depends_on:
      tuwunel:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL + pgvector (Memory Engine, exec-11) ────────────────────────
  # Alternative zu tools/pgsql/ (native Windows). Nutze eins von beiden.
  # postgres:
  #   image: pgvector/pgvector:pg17
  #   container_name: postgres
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: hindsight_dev
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  # ── LiteLLM Gateway (exec-16, Port 4000) ──────────────────────────────
  # Unified LLM proxy: model-name prefix routes to provider.
  # Starten: docker-compose --profile litellm up
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./python-backend/litellm-gateway/config.yaml:/app/config.yaml:ro
    env_file: ./python-backend/.env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - litellm

  # ── LLM Mock Agent (Dev only) ───────────────────────────────────────────
  llm-mock:
    image: python:3.13-slim
    container_name: llm-mock
    working_dir: /app
    volumes:
      - ./llm-mock:/app:ro
    environment:
      - MOCK_HOST=0.0.0.0
    entrypoint: ["sh", "-c", "pip install -q 'fastapi>=0.116.0' 'uvicorn>=0.35.0' && python mock_agent.py"]
    ports:
      - "8094:8094"
    profiles:
      - dev

  # ── OpenSandbox Server (Code Execution, exec-12) ─────────────────────────
  # Isolierte Code-Execution fuer LLM-generierten Code (Data Analysis, Backtesting).
  # Starten: docker-compose --profile sandbox up opensandbox-server
  # Braucht Docker Socket Mount fuer Container-in-Container Lifecycle.
  opensandbox-server:
    image: opensandbox/opensandbox-server:latest
    container_name: opensandbox-server
    volumes:
      - ./python-backend/agent/sandbox/sandbox-config.toml:/etc/opensandbox/config.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    environment:
      - OPEN_SANDBOX_API_KEY=dev-sandbox-key
    restart: unless-stopped
    profiles:
      - sandbox
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── TURN Server (Voice/Video Call Relay) ────────────────────────────────
  # Ohne TURN scheitern Calls wenn beide Peers hinter striktem NAT sitzen
  # (z.B. Mobilfunk ↔ Mobilfunk). STUN allein reicht dafür nicht.
  # Im dev-Profil nicht nötig — STUN-Server in tuwunel.toml reichen für LAN.
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    network_mode: host
    volumes:
      - ./homeserver/turnserver.conf:/etc/turnserver.conf:ro
    command: ["-c", "/etc/turnserver.conf"]
    restart: unless-stopped
    profiles:
      - prod

  # ── OpenSandbox Server (Code Execution, exec-12) ─────────────────────────
  # Alibaba OpenSandbox: isolierte Sandbox fuer LLM/User-generierten Code
  # Braucht Container-Socket Mount fuer Container-in-Container Lifecycle
  # Podman: podman-compose --profile sandbox up opensandbox
  # Docker: docker-compose --profile sandbox up opensandbox
  opensandbox:
    image: opensandbox/server:latest
    container_name: opensandbox
    ports:
      - "8100:8100"
    volumes:
      # Podman: /run/podman/podman.sock oder Symlink auf /var/run/docker.sock
      # Docker: /var/run/docker.sock direkt
      - ${CONTAINER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      - OPEN_SANDBOX_API_KEY=${OPEN_SANDBOX_API_KEY:-E1HuYmSjtDAR1VDBPCWms3Sap62nWML3j7uAf3ohD9g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - sandbox

volumes:
  tuwunel-data:
  postgres-data:
