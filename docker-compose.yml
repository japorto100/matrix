# Matrix Stack — podman-compose / docker-compose
# ---------------------------------------------------------------------------
# Dev (Standard): infra-only — Homeserver + NATS + Postgres (+LiteLLM opt).
#   podman-compose up -d   →  tuwunel, nats, postgres
# Go/Python/Next.js laufen NICHT im Container, sondern lokal via `scripts/dev-stack.sh`.
# Grund: Hot-Reload, lokale Debugger, schnelleres Iterieren.
#
# Opt-in Profiles:
#   --profile litellm     → LiteLLM Gateway (:4000)
#   --profile sandbox     → OpenSandbox Server (:8100) + OpenSandbox Alibaba (:8080)
#   --profile prod        → Container-Builds fuer Go/Python/Next.js + coturn
#   --profile merger      → frontend_merger als Container (:3003)

services:
  # ── Homeserver (Tuwunel v1.6.0-rc default) ───────────────────────────────
  # Image-Tag steuern via TUWUNEL_IMAGE env (default: v1.6.0-rc).
  # Stable-Fallback: TUWUNEL_IMAGE=ghcr.io/matrix-construct/tuwunel:latest podman-compose up -d
  tuwunel:
    image: ${TUWUNEL_IMAGE:-ghcr.io/matrix-construct/tuwunel:v1.6.0-rc}
    container_name: tuwunel
    volumes:
      - ./homeserver/tuwunel.image.toml:/etc/tuwunel/tuwunel.toml:ro
      - tuwunel-data:/var/lib/tuwunel
    ports:
      - "8448:8448"
    command: ["--config", "/etc/tuwunel/tuwunel.toml"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8448/_matrix/client/versions"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── NATS (Message Queue) ─────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    container_name: nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--js", "-m", "8222"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL + pgvector (Memory Engine, exec-11, Port 5433) ────────────
  # Nutzt Port 5433 (statt 5432) um Konflikte mit nativem Postgres zu vermeiden.
  # Schema-Setup via `python -m alembic upgrade head` aus python-backend/.
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hindsight_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── LiteLLM Gateway (exec-16, Port 4000) — opt-in ────────────────────────
  # Unified LLM proxy: model-name prefix routes to provider.
  # Starten: podman-compose --profile litellm up -d litellm
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./python-backend/litellm-gateway/config.yaml:/app/config.yaml:ro
    env_file: ./python-backend/.env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - litellm

  # ── OpenSandbox (Alibaba) — Code Execution, exec-12, Port 8080 ───────────
  # Starten: podman-compose --profile sandbox up -d opensandbox-server
  opensandbox-server:
    image: opensandbox/opensandbox-server:latest
    container_name: opensandbox-server
    volumes:
      - ./python-backend/agent/sandbox/sandbox-config.toml:/etc/opensandbox/config.toml:ro
      - ${CONTAINER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    ports:
      - "8080:8080"
    environment:
      - OPEN_SANDBOX_API_KEY=${OPEN_SANDBOX_API_KEY:-dev-sandbox-key}
    restart: unless-stopped
    profiles:
      - sandbox
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── OpenSandbox (2nd flavour, :8100) ─────────────────────────────────────
  opensandbox:
    image: opensandbox/server:latest
    container_name: opensandbox
    ports:
      - "8100:8100"
    volumes:
      - ${CONTAINER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      - OPEN_SANDBOX_API_KEY=${OPEN_SANDBOX_API_KEY:-E1HuYmSjtDAR1VDBPCWms3Sap62nWML3j7uAf3ohD9g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - sandbox

  # ── LLM Mock Agent (:8094) — opt-in ──────────────────────────────────────
  # Ersatz fuer real Python agent-service beim Isolationstest der BFF-Routen.
  # podman-compose --profile mock up -d llm-mock
  llm-mock:
    image: python:3.13-slim
    container_name: llm-mock
    working_dir: /app
    volumes:
      - ./llm-mock:/app:ro
    environment:
      - MOCK_HOST=0.0.0.0
    entrypoint:
      ["sh", "-c", "pip install -q 'fastapi>=0.116.0' 'uvicorn>=0.35.0' && python mock_agent.py"]
    ports:
      - "8094:8094"
    profiles:
      - mock

  # ─────────────────────────────────────────────────────────────────────────
  # PROD-PROFIL: containerisierte Go/Python/Next.js Builds.
  # Nur fuer produktionsnahe Tests oder CI — NICHT Dev-Standard!
  # Dev: scripts/dev-stack.sh startet diese als lokale Prozesse.
  # ─────────────────────────────────────────────────────────────────────────

  go-appservice:
    build: ./go-appservice
    container_name: go-appservice
    env_file: ./go-appservice/.env.development
    ports:
      - "8090:8090"
    depends_on:
      tuwunel:
        condition: service_healthy
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - prod

  python-bridge:
    build: ./python-agent-bridge
    container_name: python-bridge
    env_file: ./python-agent-bridge/.env
    ports:
      - "8097:8097"
    depends_on:
      nats:
        condition: service_healthy
      go-appservice:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - prod

  nextjs-chat:
    build:
      context: ./nextjs-chat
      args:
        - NEXT_PUBLIC_MATRIX_HOMESERVER_URL=http://localhost:8448
    container_name: nextjs-chat
    ports:
      - "3000:3000"
    depends_on:
      tuwunel:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - prod

  # ── frontend_merger (optional Container-Build) ───────────────────────────
  # podman-compose --profile merger up -d frontend-merger
  frontend-merger:
    build: ./frontend_merger
    container_name: frontend-merger
    env_file: ./frontend_merger/.env.local
    ports:
      - "3003:3003"
    environment:
      - GO_GATEWAY_BASE_URL=http://go-appservice:8090
    depends_on:
      tuwunel:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - merger
      - prod

  # ── TURN Server (Voice/Video Call Relay, prod) ───────────────────────────
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    network_mode: host
    volumes:
      - ./homeserver/turnserver.conf:/etc/turnserver.conf:ro
    command: ["-c", "/etc/turnserver.conf"]
    restart: unless-stopped
    profiles:
      - prod

volumes:
  tuwunel-data:
  postgres-data:
