# Alembic Configuration — Matrix Project (eigene Tabellen)
# Hindsight hat eigenes Alembic fuer Memory-Tabellen (public Schema).
# Wir nutzen "matrix" Schema fuer unsere Tabellen (audit, etc.).
#
# Migration erstellen: uv run alembic revision --autogenerate -m "description"
# Migrieren: uv run alembic upgrade head
# Status: uv run alembic current

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://postgres@localhost:5433/hindsight_dev

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
