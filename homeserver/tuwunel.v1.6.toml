# Tuwunel v1.6.0-rc — Dev Config (Testing Release Candidate)
#
# Starten:  .\scripts\dev-stack2.ps1 -Tuwunel16
# Oder manuell:
#   wsl -d Ubuntu -u root bash -c "cd /mnt/d/matrix && ./tools/tuwunel-v1.6 --config ./homeserver/tuwunel.v1.6.toml"
#
# Status: Release Candidate seit 2026-04-06, noch nicht stable.
# Siehe _ref/tuwunel-v1.6.0-rc/COMPARISON.md fuer Feature-Vergleich v1.5.1 -> v1.6.0-rc.
# Siehe _ref/tuwunel-v1.6.0-rc/TESTING.md fuer Test-Runbook.
#
# !!! WICHTIG: Diese Config nutzt die GETEILTE DB mit v1.5.1 (./homeserver/data/db).
# !!! VOR dem ersten Start: .\scripts\backup-before-v1.6.ps1 ausfuehren!
# !!! v1.6.0-rc fuehrt Schema-Migration durch — Rollback ohne Backup nicht moeglich.

[global]
server_name = "matrix.local"
database_path = "./homeserver/data/db"   # GETEILT mit v1.5.1
address = "0.0.0.0"
port = 8448
log = "info"   # release-all Binary hat max_level_info — DEBUG nicht verfuegbar.
# Fuer echte DEBUG-Traces: release-logging Binary-Variante runterladen.

# ─── RC-Safety: schlage Start ab bei unbekannten Config-Keys ────────────────
# Hilft beim RC-Testing, Typos oder veraltete Options fallen sofort auf.
error_on_unknown_config_opts = true

# ─── HTTP Response Compression ─────────────────────────────────────────────
# Spart Bandbreite ueber CF Tunnel fuer Matrix-Sync-Responses (JSON, hochgradig komprimierbar).
# Sicher im Dev-Setup: wir haben kein TLS direkt auf Tuwunel (CF-Tunnel terminiert es),
# BREACH-Risiko nicht anwendbar. In Prod mit eigener TLS vor Tuwunel: false setzen.
zstd_compression = true

# ─── Room Version ─────────────────────────────────────────────────────────────
default_room_version = "12"

# ─── Registrierung ───────────────────────────────────────────────────────────
allow_registration = true
registration_token = "matrix-dev-token-2026"
allow_guest_registration = false
auto_join_rooms = ["#general:matrix.local"]

# ─── Federation ──────────────────────────────────────────────────────────────
allow_federation = false
federate_created_rooms = false

# ─── E2EE ────────────────────────────────────────────────────────────────────
# "none" = Canonical value (docs: "Explicit value for no effect")
# Vorher: "off" — war technisch ein unbekannter Wert, fiel auf Default zurueck.
encryption_enabled_by_default_for_room_type = "none"

# ─── Presence ────────────────────────────────────────────────────────────────
allow_local_presence    = true
allow_incoming_presence = false
allow_outgoing_presence = false

# ─── Media: Upload-Limit ──────────────────────────────────────────────────────
# 100 MB = Cloudflare Free/Pro Plan Request-Body-Cap.
# Wenn MSC2246-Async-Upload stabil ist, koennen wir spaeter Chunking nutzen und
# den Wert in Test-Phase 5 probehalber auf 500 MB erhoehen.
max_request_size = 104857600  # 100 MB (Cloudflare Free Plan Limit)

# ─── Media: Async Upload (MSC2246) — NEU in v1.6.0 ──────────────────────────
# Client kann per POST /_matrix/media/v1/create eine MXC-URI reservieren und
# dann die Bytes per PUT /_matrix/media/v3/upload/{serverName}/{mediaId}
# nachliefern. Entkoppelt Upload von Raum-Event, ermoeglicht resumable Uploads
# in Clients die es unterstuetzen (Element X teilweise, FluffyChat nicht).
#
# Defaults sind vernuenftig — explizit gesetzt fuer Dokumentation.
max_pending_media_uploads           = 5       # gleichzeitige offene MXC-URIs pro User
media_create_unused_expiration_time = 86400   # 24h bis ungenutzte MXC-URI recycled wird
media_rc_create_per_second          = 10      # Rate-Limit pro User
media_rc_create_burst_count         = 50      # Burst-Cap

# ─── Media: Legacy-URLs erlauben (QW-4 / MSC3916) ───────────────────────────
allow_legacy_media = true

# ─── Media: Migrations-Safety ───────────────────────────────────────────────
# Default ist false — explizit gesetzt damit bei Pfad-Mismatch die DB-Eintraege
# nicht verwaist werden (wichtig beim v1.5 → v1.6 Media-Pfad-Uebergang).
prune_missing_media = false

# ─── Media: Storage Providers — NEU in v1.6.0 ─────────────────────────────────
# Start-State fuer Test-Phase 1/2: nur lokaler Filesystem-Provider aktiv.
# In Test-Phase 3 wird store_media_on_providers auf ["seaweedfs"] umgestellt.
#
# Reihenfolge in media_storage_providers = Such-Reihenfolge beim Lesen
# (erster Treffer gewinnt). store_media_on_providers = wo NEUE Uploads landen.
media_storage_providers = ["media", "seaweedfs"]
# Phase 3 aktiv: Neue Uploads landen in SeaweedFS.
# "media" bleibt als Read-Fallback fuer alte Bilder in ./homeserver/data/db/media/.
store_media_on_providers = ["seaweedfs"]

# Provider 1: Lokales Filesystem
# WICHTIG: v1.5 Tuwunel/conduwuit speichert Media im Default unter <database_path>/media/
# also ./homeserver/data/db/media/. Damit v1.6 alte Bilder findet, MUSS der Pfad darauf zeigen.
# (Nicht ./homeserver/data/media — das ist leer, dort liegen keine historischen Files.)
[global.storage_provider.media.local]
base_path              = "./homeserver/data/db/media"
create_if_missing      = true
delete_empty_directories = true
startup_check          = true

# Provider 2: SeaweedFS S3 (laeuft im devstack auf :8333, Credentials aus tools/seaweedfs/s3.json)
# WICHTIG — Netzwerk-Annahme:
# Devstack startet SeaweedFS mit -ip.bind=127.0.0.1 (Windows-Localhost).
# Tuwunel laeuft in WSL1 — WSL1 teilt den Windows-Netzwerk-Stack, also ist
# 127.0.0.1 aus WSL1 identisch mit Windows' 127.0.0.1. Direkt erreichbar.
# Bei WSL2-Migration oder Podman-Deployment: entweder hier host.docker.internal
# setzen, oder devstack auf -ip.bind=0.0.0.0 umstellen (siehe dev-stack2.ps1:416).
[global.storage_provider.seaweedfs.S3]
endpoint               = "http://127.0.0.1:8333"
bucket                 = "matrix-media"
region                 = "us-east-1"
key                    = "uqiEZ3ivbqCXKEXcBMkZ"
secret                 = "Qfx6XdG0HjJIo1P1mk0WKY5PUzTTSAmuUjq9dowV"
base_path              = "tuwunel-v1.6/"   # Prefix damit v1.6-Uploads im Bucket separat liegen
use_https              = false
use_payload_signatures = true
startup_check          = true

# Provider 2-ALTERNATIVE: Garage (lightweight Rust-S3, AGPLv3) — OPT-IN
# Zum Switchen (Garage statt SeaweedFS):
#   1. In media_storage_providers + store_media_on_providers oben: "seaweedfs" → "garage"
#   2. [seaweedfs.S3]-Block oben auskommentieren, diesen Block unten aktivieren
#   3. Garage-Container starten: `podman-compose --profile storage-garage up -d garage`
#   4. S3-Credentials generieren: `podman exec garage /garage key create matrix-key`
#      (Access Key + Secret aus Output in key/secret unten eintragen)
# [global.storage_provider.garage.S3]
# endpoint               = "http://127.0.0.1:3900"
# bucket                 = "matrix-media"
# region                 = "garage"
# key                    = "GKot8ljSiCkDeOlfpbTZOoLhBg"
# secret                 = "xPd0tydyy1C5IcEwj4KtDNRxLIeTZLWyiq7QcLvn"
# base_path              = "tuwunel-v1.6/"
# use_https              = false
# use_payload_signatures = true
# startup_check          = true

# ─── STUN/TURN (Voice/Video Calls) ──────────────────────────────────────────
turn_uris = [
    "stun:stun.cloudflare.com:3478",
    "stun:stun.l.google.com:19302",
    "turn:a.relay.metered.ca:80",
    "turn:a.relay.metered.ca:80?transport=tcp",
    "turn:a.relay.metered.ca:443?transport=tcp",
    "turns:a.relay.metered.ca:443?transport=tcp"
]
turn_username = "openrelayproject"
turn_password = "openrelayproject"

# ─── User Directory ──────────────────────────────────────────────────────────
show_all_local_users_in_user_directory = true

# ─── RocksDB / Storage ──────────────────────────────────────────────────────
rocksdb_direct_io = false   # WSL2+NTFS
database_backup_path      = "./homeserver/data/db-backups"
database_backups_to_keep  = 3

# ─── .well-known (Client-Discovery) ──────────────────────────────────────────
[global.well_known]
client = "http://192.168.1.34:8448"
server = "192.168.1.34:8448"

# ─── MatrixRTC / LiveKit ─────────────────────────────────────────────────────
[[global.well_known.rtc_transports]]
type = "livekit"
livekit_service_url = "http://192.168.1.34:8080"

# ─── Appservice: Go Appservice (Trading Agent) ───────────────────────────────
# v1.6 Breaking: explicit id field required and must match TOML section key.
# Vorher (v1.5) wurde der Section-Name implizit als id uebernommen.
[global.appservice.trading-agent]
id         = "trading-agent"
url        = "http://127.0.0.1:8090"
as_token   = "1afe887982fea51764e0c144f01b80c246673be07f1af00fac717ce04bf1b1ba"
hs_token   = "14eb01ae88e2eafa0b3ce31fe80970ca51a5dc4e0c1e914b6e9bb532d810076d"
sender_localpart = "appservice-bot"
rate_limited = false

[[global.appservice.trading-agent.namespaces.users]]
exclusive = true
regex = "@agent-.*:matrix\\.local"
