# Tuwunel v1.6.0 stable — Container Config (Linux + podman + Garage)
#
# Starten: ./scripts/dev-stack.sh  (lädt diese via docker-compose volume mount)
# Manuell: podman compose up -d tuwunel
#
# Status: v1.6.0 stable, released 2026-04-12.
# Bekannte issue: S3 large-uploads (~200 MiB) → fixed in v1.6.1.
# Workaround: max_request_size = 100 MB (siehe unten).
#
# Siehe _ref/tuwunel-v1.6.0-rc/COMPARISON.md fuer Feature-Vergleich v1.5.1 -> v1.6.0.
# Siehe _ref/tuwunel-v1.6.0-rc/TESTING.md fuer Test-Runbook.
# Diff rc → stable: FreeBSD fix, rand crate pin, `allowed_remote_server_names` experimental rename.

[global]
server_name = "matrix.local"
# Container-pfad (volume mount zu tuwunel-data volume).
database_path = "/var/lib/tuwunel/db"
address = "0.0.0.0"
port = 8448
log = "info"                          # release-all Binary hat max_level_info — DEBUG nicht verfuegbar.
# Fuer echte DEBUG-Traces: release-logging Binary-Variante runterladen.

# ─── RC-Safety: schlage Start ab bei unbekannten Config-Keys ────────────────
# Hilft beim RC-Testing, Typos oder veraltete Options fallen sofort auf.
error_on_unknown_config_opts = true

# ─── HTTP Response Compression ─────────────────────────────────────────────
# Spart Bandbreite ueber CF Tunnel fuer Matrix-Sync-Responses (JSON, hochgradig komprimierbar).
# Sicher im Dev-Setup: wir haben kein TLS direkt auf Tuwunel (CF-Tunnel terminiert es),
# BREACH-Risiko nicht anwendbar. In Prod mit eigener TLS vor Tuwunel: false setzen.
zstd_compression = true

# ─── Room Version ─────────────────────────────────────────────────────────────
default_room_version = "12"

# ─── Registrierung ───────────────────────────────────────────────────────────
allow_registration = true
registration_token = "matrix-dev-token-2026"
allow_guest_registration = false
auto_join_rooms = ["#general:matrix.local"]

# ─── Federation ──────────────────────────────────────────────────────────────
allow_federation = false
federate_created_rooms = false

# ─── E2EE ────────────────────────────────────────────────────────────────────
# "none" = Canonical value (docs: "Explicit value for no effect")
# Vorher: "off" — war technisch ein unbekannter Wert, fiel auf Default zurueck.
encryption_enabled_by_default_for_room_type = "none"

# ─── Presence ────────────────────────────────────────────────────────────────
allow_local_presence = true
allow_incoming_presence = false
allow_outgoing_presence = false

# ─── Media: Upload-Limit ──────────────────────────────────────────────────────
# 100 MB = Cloudflare Free/Pro Plan Request-Body-Cap.
# Wenn MSC2246-Async-Upload stabil ist, koennen wir spaeter Chunking nutzen und
# den Wert in Test-Phase 5 probehalber auf 500 MB erhoehen.
max_request_size = 104857600 # 100 MB (Cloudflare Free Plan Limit)

# ─── Media: Async Upload (MSC2246) — NEU in v1.6.0 ──────────────────────────
# Client kann per POST /_matrix/media/v1/create eine MXC-URI reservieren und
# dann die Bytes per PUT /_matrix/media/v3/upload/{serverName}/{mediaId}
# nachliefern. Entkoppelt Upload von Raum-Event, ermoeglicht resumable Uploads
# in Clients die es unterstuetzen (Element X teilweise, FluffyChat nicht).
#
# Defaults sind vernuenftig — explizit gesetzt fuer Dokumentation.
max_pending_media_uploads = 5               # gleichzeitige offene MXC-URIs pro User
media_create_unused_expiration_time = 86400 # 24h bis ungenutzte MXC-URI recycled wird
media_rc_create_per_second = 10             # Rate-Limit pro User
media_rc_create_burst_count = 50            # Burst-Cap

# ─── Media: Legacy-URLs erlauben (QW-4 / MSC3916) ───────────────────────────
allow_legacy_media = true

# ─── URL Preview ─────────────────────────────────────────────────────────────
# SSRF-Schutz: keine Domains sind fuer serverseitige URL-Previews erlaubt.
# Tuwunel blockiert Preview-Fetches, wenn die Allowlist leer bleibt.
url_preview_domain_contains_allowlist = []
url_preview_domain_explicit_allowlist = []
url_preview_url_contains_allowlist = []

# ─── Media: Migrations-Safety ───────────────────────────────────────────────
# Default ist false — explizit gesetzt damit bei Pfad-Mismatch die DB-Eintraege
# nicht verwaist werden (wichtig beim v1.5 → v1.6 Media-Pfad-Uebergang).
prune_missing_media = false

# ─── Media: Storage Providers — NEU in v1.6.0 ─────────────────────────────────
# Start-State fuer Test-Phase 1/2: nur lokaler Filesystem-Provider aktiv.
# In Test-Phase 3 wird store_media_on_providers auf ["seaweedfs"] umgestellt.
#
# Reihenfolge in media_storage_providers = Such-Reihenfolge beim Lesen
# (erster Treffer gewinnt). store_media_on_providers = wo NEUE Uploads landen.
media_storage_providers = ["media", "garage"]
# Neue Uploads landen in Garage (S3).
# "media" bleibt als Read-Fallback fuer alte Bilder in /var/lib/tuwunel/db/media/.
store_media_on_providers = ["garage"]

# Provider 1: Lokales Filesystem
# WICHTIG: v1.5 Tuwunel/conduwuit speichert Media im Default unter <database_path>/media/
# also ./homeserver/data/db/media/. Damit v1.6 alte Bilder findet, MUSS der Pfad darauf zeigen.
# (Nicht ./homeserver/data/media — das ist leer, dort liegen keine historischen Files.)
[global.storage_provider.media.local]
base_path = "/var/lib/tuwunel/db/media"
create_if_missing = true
delete_empty_directories = true
startup_check = true

# Provider 2: Garage S3 (default in unserem Linux+Podman setup)
# Endpoint = compose-service-name "garage" im selben network → Port 3900 intern.
# Keys werden beim ersten Start von scripts/setup-garage.sh erzeugt und via sed
# hier eingefuegt (ersetzt GARAGE_*_PLACEHOLDER, markiert mit "# garage-managed").
[global.storage_provider.garage.S3]
endpoint = "http://garage:3900"
bucket = "matrix-media"
region = "garage"
key = "GK8b0fe0ac1c6ba2e42d880bb2"    # garage-managed
secret = "b4c0dd8e052d0945e5a2af426247114a17cc27f3ba9ec2accc6a1614d80ef57c" # garage-managed
base_path = "tuwunel-v1.6/"
use_https = false
use_payload_signatures = true
startup_check = true

# Provider 2-ALTERNATIVE: SeaweedFS (AUSKOMMENTIERT — opt-in statt Garage)
# Zum Switchen:
#   1. media_storage_providers + store_media_on_providers oben: "garage" → "seaweedfs"
#   2. [garage.S3]-Block oben auskommentieren, diesen Block unten aktivieren
#   3. ./scripts/dev-stack.sh --storage=seaweedfs (stoppt garage, startet seaweedfs)
# [global.storage_provider.seaweedfs.S3]
# endpoint               = "http://seaweedfs:8333"
# bucket                 = "matrix-media"
# region                 = "us-east-1"
# key                    = "uqiEZ3ivbqCXKEXcBMkZ"
# secret                 = "Qfx6XdG0HjJIo1P1mk0WKY5PUzTTSAmuUjq9dowV"
# base_path              = "tuwunel-v1.6/"
# use_https              = false
# use_payload_signatures = true
# startup_check          = true

# ─── STUN/TURN (Voice/Video Calls) ──────────────────────────────────────────
turn_uris = [
  "stun:stun.cloudflare.com:3478",
  "stun:stun.l.google.com:19302",
  "turn:a.relay.metered.ca:80",
  "turn:a.relay.metered.ca:80?transport=tcp",
  "turn:a.relay.metered.ca:443?transport=tcp",
  "turns:a.relay.metered.ca:443?transport=tcp",
]
turn_username = "openrelayproject"
turn_password = "openrelayproject"

# ─── User Directory ──────────────────────────────────────────────────────────
show_all_local_users_in_user_directory = true

# ─── RocksDB / Storage ──────────────────────────────────────────────────────
# Linux container ext4 → direct I/O sicher und schneller.
rocksdb_direct_io = true
database_backup_path = "/var/lib/tuwunel/db-backups"
database_backups_to_keep = 3

# ─── .well-known (Client-Discovery) ──────────────────────────────────────────
# localhost funktioniert für Desktop-Browser (port-mapped auf host:8448).
# Für Mobile-im-LAN: ersetzen mit LAN-IP. Für Mobile-extern: CF-tunnel-URL.
[global.well_known]
client = "http://localhost:8448"
server = "localhost:8448"

# ─── MatrixRTC / LiveKit ─────────────────────────────────────────────────────
# lk-jwt-service läuft im compose (Host :8082 → Container :8080). Host-port
# war :8080, kollidierte mit opensandbox-api-gateway unter profile sandbox.
#
# IMPORTANT: This URL is dereferenced from INSIDE the tuwunel container —
# "localhost" would resolve to the container loopback, NOT the host where
# lk-jwt is listening on :8082. host.containers.internal is Podman's
# rootless alias for the host gateway (equivalent to Docker's
# host.docker.internal). If running with --network host, switch back to
# http://localhost:8082.
[[global.well_known.rtc_transports]]
type = "livekit"
livekit_service_url = "http://host.containers.internal:8082"

# ─── Appservice: via admin-command (tuwunel-native) ──────────────────────────
# Tuwunel v1.6.0 stable hat bugs mit inline-config und `appservice_dir`-auto-load
# (partial-parsing: as_token wird geladen, namespace-regex nicht → M_EXCLUSIVE).
#
# Workaround: appservice wird dynamic registriert via admin-command in der
# #admins room von alice (first-user-admin). Siehe scripts/register-appservice.sh
# (ruft !admin appservices register mit registration.yaml content auf).
#
# Yaml bleibt homeserver/appservices/registration.yaml als single-source.
# Keine inline [global.appservice.X]-section → verhindert duplicate-id-conflict.
