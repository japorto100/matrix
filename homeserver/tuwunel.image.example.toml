# Tuwunel — Container Config (docker-compose / podman-compose)
# Devstack (ohne Container): tuwunel.toml verwenden

[global]
server_name = "matrix.local"
database_path = "/var/lib/tuwunel/db"
address = "0.0.0.0"
port = 8448
log = "warn"

# ─── Room Version ─────────────────────────────────────────────────────────────
default_room_version = "12"

# ─── Registrierung ───────────────────────────────────────────────────────────
allow_registration = true
registration_token = "REPLACE_WITH_REGISTRATION_TOKEN"
allow_guest_registration = false
auto_join_rooms = ["#general:matrix.local"]

# ─── Federation ──────────────────────────────────────────────────────────────
allow_federation = false
federate_created_rooms = false

# ─── E2EE ────────────────────────────────────────────────────────────────────
# E2EE aus — Clients entscheiden pro Raum
encryption_enabled_by_default_for_room_type = "off"

# ─── Presence ──────────────────────────────────────────────────────────────
allow_local_presence = true
allow_incoming_presence = false
allow_outgoing_presence = false

# ─── Media ─────────────────────────────────────────────────────────────────
max_request_size = 524288000  # 500 MB
# Dev: true (Legacy-URLs ohne Auth-Header erlaubt)
# Prod: false (erzwingt Authenticated Media MSC3916, Next.js API-Proxy übernimmt Auth)
allow_legacy_media = true

# ─── URL Preview ─────────────────────────────────────────────────────────────
# Deaktiviert (SSRF-Risiko). Siehe specs/16-security.md.
# url_preview_domain_contains_allowlist = [""]

# ─── RocksDB / Storage ──────────────────────────────────────────────────────
# Container = ext4 → Direct I/O sicher
rocksdb_direct_io = true
database_backup_path = "/var/lib/tuwunel/db-backups"
database_backups_to_keep = 3

# ─── STUN/TURN (Voice/Video Calls) ──────────────────────────────────────────
# Dev: Metered.ca Open Relay (kostenlos, 50 GB/Monat, Static Auth)
# Prod: Eigener coturn Server empfohlen (docker-compose.yml hat coturn Service)
turn_uris = [
    "stun:stun.cloudflare.com:3478",
    "stun:stun.l.google.com:19302",
    "turn:a.relay.metered.ca:80",
    "turn:a.relay.metered.ca:80?transport=tcp",
    "turn:a.relay.metered.ca:443?transport=tcp",
    "turns:a.relay.metered.ca:443?transport=tcp"
]
turn_username = "openrelayproject"
turn_password = "openrelayproject"
# Prod mit eigenem coturn:
# turn_uris = ["turn:turn.yourdomain.com:3478?transport=udp", "turn:turn.yourdomain.com:3478?transport=tcp"]
# turn_secret = "your-coturn-shared-secret"
# turn_ttl = 86400

# ─── .well-known ─────────────────────────────────────────────────────────────
# localhost:8448 — Browser/Mobile greifen über Host-Port zu
[global.well_known]
client = "http://localhost:8448"
server = "localhost:8448"

# ─── Appservice: Go Appservice ───────────────────────────────────────────────
# Container-Netzwerk: Service-Name statt 127.0.0.1
[global.appservice.trading-agent]
url        = "http://go-appservice:8090"
as_token   = "REPLACE_WITH_AS_TOKEN"
hs_token   = "REPLACE_WITH_HS_TOKEN"
sender_localpart = "appservice-bot"
rate_limited = false

[[global.appservice.trading-agent.namespaces.users]]
exclusive = true
regex = "@agent-.*:matrix\\.local"
