# coturn TURN Server — Production Config Template
# Wird von docker-compose.yml gemountet (prod Profil)
# Werte anpassen vor Deployment!

listening-port=3478
tls-listening-port=5349

# Domain des TURN-Servers (= Homeserver-Domain oder eigene Subdomain)
realm=matrix.yourdomain.com

# Shared Secret — muss mit tuwunel.toml turn_secret übereinstimmen
use-auth-secret
static-auth-secret=REPLACE_WITH_GENERATED_SECRET

# TLS-Zertifikate (Let's Encrypt)
# cert=/etc/letsencrypt/live/matrix.yourdomain.com/fullchain.pem
# pkey=/etc/letsencrypt/live/matrix.yourdomain.com/privkey.pem

# Sicherheit: keine Relay-Verbindungen zu privaten Netzwerken
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Logging
log-file=stdout
verbose
