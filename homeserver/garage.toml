# Garage v2.3.0 Dev Config (single-node, SOTA 2026-04)
# Production-Multi-Node: https://garagehq.deuxfleurs.fr/documentation/reference-manual/configuration/

# ─── Storage Paths ────────────────────────────────────────────────────────────
metadata_dir = "/var/lib/garage/meta"
data_dir     = "/var/lib/garage/data"

# ─── Replication (v2.0+ syntax, ersetzt legacy replication_mode) ─────────────
# factor=1 + consistent = single-node dev (no redundancy, not for prod)
replication_factor = 1
consistency_mode   = "consistent"

# ─── Database Engine ──────────────────────────────────────────────────────────
# LMDB ist v2.x default + stabil. Alternatives: sqlite (nicht empfohlen fürs prod).
db_engine = "lmdb"

# ─── Dev-Performance: fsync AUS (schneller, OK da ephemeral-dev) ─────────────
metadata_fsync = false
data_fsync     = false

# ─── Scrub ────────────────────────────────────────────────────────────────────
# Disable scrub: dev hat keine multi-node redundancy check-needs
disable_scrub = true

# ─── RPC (Cluster-Coordination) ───────────────────────────────────────────────
# rpc_secret = 32-byte hex (64 chars). Generated via `openssl rand -hex 32`.
# Für single-node auch required — Garage nutzt es intern für admin-commands.
rpc_secret       = "478b0544c8249a73b9a8b80ef0244454640cb4ff7d1112ce45d8244d25f1f689"
rpc_bind_addr    = "[::]:3901"
rpc_public_addr  = "127.0.0.1:3901"

# ─── Dev-Mode: erlaubt readable secrets im config-file (nötig da wir rpc_secret
# inline haben, nicht via *_file oder env-var). In prod: secrets über
# environment variables ODER *_file-variante.
allow_world_readable_secrets = true

# ─── S3 API (Tuwunel + go-appservice verbinden sich hier) ────────────────────
[s3_api]
api_bind_addr = "[::]:3900"
s3_region     = "garage"
# root_domain für virtual-hosted-style (nicht genutzt, wir nutzen path-style)
root_domain   = ".s3.garage.local"

# ─── Admin API (für `garage` CLI remote commands) ────────────────────────────
# admin_token leer = no-auth (nur dev, lokal, nicht public exposed).
[admin]
api_bind_addr = "[::]:3903"
admin_token   = ""
